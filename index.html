<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issue-login</title>
    <link rel="shortcut icon" href="./assets/Open-Status.png" type="image/x-icon" />

    <!-- tailwind+daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font family -->
    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="min-h-screen bg-[#F8FAFC] pb-24">
    <div class="max-w-md mx-auto">
      <div class="card bg-white w-full max-w-sm shadow mx-auto rounded-2xl">
            <!-- Logo & Title -->
      <div class="text-center pt-20 mb-8">
        <img
          src="./assets/github-logo.png"
          class="w-16 h-16 mx-auto mb-3"
          alt=""
        />
        <h1 class="text-2xl font-semibold text-[#1F2937]">
          GitHub Issues Tracker
        </h1>
        <p class="text-sm text-[#64748B] mt-1">Sign in to manage your issues</p>
      </div>
      <!-- Form Card -->
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral font-bold">Username</label>
            <input
              id="input-Username"
              maxlength="5"
              minlength="5"
              type="text"
              class="input rounded-full bg-white w-full"
              value="admin"
              placeholder="Enter Username"
            />

            <br />

            <label class="label text-neutral font-bold">Password</label>
            <input
              id="input-Password"
              maxlength="8"
              minlength="8"
              type="password"
              class="input rounded-full bg-white w-full"
              placeholder="Enter Password"
            />

            <button
              id="login-btn"
              class="btn btn-primary mt-4 rounded-full w-full"
            >
              Sign In
            </button>
          </fieldset>
           <!-- OR Divider -->
        <div class="flex items-center gap-4 my-5 ">
          <div class="flex-1 h-px bg-gray-300"></div>
          <span class="text-sm text-[#6B7280]">OR</span>
          <div class="flex-1 h-px bg-gray-300"></div>
        </div>

          <!-- Demo Credentials -->
        <div class="text-center">
          <p class="text-sm text-[#6B7280] mb-3">Demo Credentials:</p>
          <div class="bg-[#F9FAFB] rounded-xl px-6 py-4 text-sm text-[#1F2937]">
            <p><span class="font-bold">Username:</span> admin</p>
            <p class="mt-1"><span class="font-bold">Password:</span> admin123</p>
          </div>
        </div>
        </div>
      </div>
     
      </div>
    </div>
    
    <script src="script/loging.js"></script>
  </body>
</html>
